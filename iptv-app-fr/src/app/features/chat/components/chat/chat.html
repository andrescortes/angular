<div
  class="flex flex-col h-screen max-w-3xl mx-auto overflow-hidden bg-linear-to-br from-indigo-50 via-white to-purple-50 shadow-2xl border-x border-gray-200">

  <header
    class="flex justify-between items-center p-5 bg-white/80 backdrop-blur-md sticky top-0 z-10 border-b border-indigo-100 shadow-sm">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 rounded-full bg-linear-to-tr from-indigo-600 to-purple-500 flex items-center justify-center text-white font-bold shadow-md">
        RC
      </div>
      <div>
        <h2 class="text-lg font-bold text-gray-800 leading-tight">Reactive Chat</h2>
        <p class="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">Real-time Stream</p>
      </div>
    </div>

    <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-white shadow-inner border border-gray-100">
      <span class="relative flex h-2 w-2">
        <span [class]="store.connected() ? 'bg-green-400' : 'bg-red-400'"
          class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"></span>
        <span [class]="store.connected() ? 'bg-green-500' : 'bg-red-500'"
          class="relative inline-flex rounded-full h-2 w-2"></span>
      </span>
      <span class="text-xs font-medium text-gray-600">
        {{ store.connected() ? 'Live' : 'Disconnected' }}
      </span>
    </div>
  </header>

  <div #scrollContainer class="grow overflow-y-auto px-6 py-8 space-y-6 scroll-smooth custom-scrollbar">
    @for (chat of store.chats(); track $index) {
    <div [class]="chat.sender === store.currentUser() ? 'flex justify-end' : 'flex justify-start'"
      class="animate-in fade-in slide-in-from-bottom-2 duration-300">

      <div class="flex flex-col gap-1 max-w-[75%]">
        <div [class]="chat.sender === store.currentUser()
                ? 'bg-linear-to-tr from-indigo-600 to-indigo-500 text-white rounded-2xl rounded-tr-none shadow-indigo-200'
                : 'bg-white text-gray-800 rounded-2xl rounded-tl-none border border-gray-100 shadow-sm'"
          class="p-4 shadow-lg transition-transform hover:scale-[1.01]">

          <p class="text-[15px] leading-relaxed select-text">{{ chat.message }}</p>
        </div>

        <div [class]="chat.sender === store.currentUser() ? 'text-right' : 'text-left'"
          class="flex items-center gap-2 px-1 text-[10px] text-gray-400 font-medium uppercase tracking-tight">
          <span>{{ chat.sender }}</span>
          <span>•</span>
          <span>{{ chat.createdAt | date:'HH:mm' }}</span>
        </div>
      </div>
    </div>
    }
  </div>

  <div class="p-6 bg-transparent">
    <div
      class="bg-white/90 backdrop-blur-md p-2 rounded-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)] flex gap-3 items-center border border-white">
      <mat-form-field class="grow" appearance="outline" subscriptSizing="dynamic">
        <input matInput [(ngModel)]="newMessage" (keyup.enter)="send()" placeholder="Write a message..."
          class="text-black! px-4 py-2">
      </mat-form-field>

      <button mat-mini-fab class="bg-indigo-600! text-white! shadow-indigo-300! hover:rotate-12 transition-transform"
        (click)="send()" [disabled]="!newMessage.trim()">
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </div>
</div>
